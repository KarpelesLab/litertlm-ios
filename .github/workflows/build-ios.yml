name: "Build LiteRT-LM for iOS"

# Project is shelved (see README). Auto-triggers disabled to save runner minutes.
# Run manually via "Run workflow" button or gh cli:
#   gh workflow run build-ios.yml
on:
  workflow_dispatch:
    inputs:
      litert_lm_version:
        description: 'LiteRT-LM version tag'
        default: 'v0.10.1'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: "Build iOS xcframework"
    runs-on: macos-15
    timeout-minutes: 180
    env:
      LITERT_LM_VERSION: ${{ inputs.litert_lm_version || 'v0.10.1' }}
      WORK_DIR: ${{ github.workspace }}/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up cache keys
        id: cache-keys
        run: |
          echo "key=bazel-ios-${{ env.LITERT_LM_VERSION }}-${{ runner.os }}-${{ hashFiles('scripts/build-litert-lm-ios.sh') }}" >> "$GITHUB_OUTPUT"

      - name: Restore Bazel cache
        uses: actions/cache/restore@v4
        id: bazel-cache
        with:
          path: ~/.cache/bazel-ios
          key: ${{ steps.cache-keys.outputs.key }}
          restore-keys: |
            bazel-ios-${{ env.LITERT_LM_VERSION }}-${{ runner.os }}-

      - name: Build LiteRT-LM for iOS
        run: |
          chmod +x scripts/build-litert-lm-ios.sh
          scripts/build-litert-lm-ios.sh

      - name: Verify xcframework
        run: |
          echo "=== LiteRTLM.xcframework ==="
          find build/output/LiteRTLM.xcframework -maxdepth 3 | head -20
          echo ""
          echo "=== Public headers ==="
          find build/output/LiteRTLM.xcframework -name '*.h' | sort

      - name: Test link (simulator + device)
        run: |
          cat > /tmp/framework_test.m << 'TESTEOF'
          #import "LiteRTLM.h"
          int main() {
              @autoreleasepool {
                  LRTEngineConfig *config = [LRTEngineConfig configWithModelPath:@"test.litertlm"];
                  LRTSessionConfig *sc = [LRTSessionConfig defaultConfig];
                  sc.enableVision = YES;
                  LRTConversationConfig *cc = [LRTConversationConfig defaultConfig];
                  cc.enableConstrainedDecoding = YES;
                  LRTConstraint *c = [LRTConstraint jsonSchemaConstraint:@"{}"];
                  LRTDecodeConfig *dc = [LRTDecodeConfig defaultConfig];
                  LRTInputText *t = [LRTInputText inputWithText:@"hi"];
                  LRTInputImage *img = [LRTInputImage inputWithData:[NSData data]];
                  LRTChannel *ch = [LRTChannel channelWithName:@"t" startDelimiter:@"<t>" endDelimiter:@"</t>"];
                  (void)config; (void)sc; (void)cc; (void)c; (void)dc; (void)t; (void)img; (void)ch;
              }
              return 0;
          }
          TESTEOF

          # Test both architectures: simulator AND device
          for SLICE in ios-arm64-simulator ios-arm64; do
            echo "=== Testing ${SLICE} ==="
            SLICE_DIR="build/output/LiteRTLM.xcframework/${SLICE}"
            if [ ! -d "${SLICE_DIR}" ]; then
              echo "ERROR: ${SLICE_DIR} not found"
              exit 1
            fi

            HDR_DIR="${SLICE_DIR}/Headers"
            LIB_FILE=$(find "${SLICE_DIR}" -name '*.a' | head -1)

            case "${SLICE}" in
              *simulator*) TARGET="arm64-apple-ios13.0-simulator"; SDK="iphonesimulator" ;;
              *)           TARGET="arm64-apple-ios13.0";           SDK="iphoneos" ;;
            esac
            SDK_PATH="$(xcrun --sdk "${SDK}" --show-sdk-path)"

            echo "  Compiling..."
            xcrun --sdk "${SDK}" clang \
              -fobjc-arc -target "${TARGET}" -isysroot "${SDK_PATH}" \
              -I "${HDR_DIR}" \
              -c /tmp/framework_test.m -o /tmp/framework_test_${SLICE}.o

            echo "  Linking with -force_load..."
            xcrun --sdk "${SDK}" clang++ \
              -target "${TARGET}" -isysroot "${SDK_PATH}" \
              -force_load "${LIB_FILE}" \
              -framework Foundation -framework Metal -framework MetalPerformanceShaders \
              -framework AVFoundation -framework AudioToolbox \
              -lc++ -lobjc \
              /tmp/framework_test_${SLICE}.o \
              -o /tmp/framework_test_${SLICE}_bin

            echo "  ${SLICE} OK"
          done
          echo "=== All link tests PASSED ==="

      - name: Upload LiteRTLM.xcframework
        uses: actions/upload-artifact@v4
        with:
          name: LiteRTLM-${{ env.LITERT_LM_VERSION }}
          path: build/output/LiteRTLM.xcframework
          retention-days: 90

      - name: Save Bazel cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.cache/bazel-ios
          key: ${{ steps.cache-keys.outputs.key }}

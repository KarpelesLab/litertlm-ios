name: "Build LiteRT-LM for iOS"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      litert_lm_version:
        description: 'LiteRT-LM version tag'
        default: 'v0.10.1'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: "Build iOS xcframework"
    runs-on: macos-15
    timeout-minutes: 180
    env:
      LITERT_LM_VERSION: ${{ inputs.litert_lm_version || 'v0.10.1' }}
      WORK_DIR: ${{ github.workspace }}/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up cache keys
        id: cache-keys
        run: |
          echo "key=bazel-ios-${{ env.LITERT_LM_VERSION }}-${{ runner.os }}-${{ hashFiles('scripts/build-litert-lm-ios.sh') }}" >> "$GITHUB_OUTPUT"

      - name: Restore Bazel cache
        uses: actions/cache/restore@v4
        id: bazel-cache
        with:
          path: ~/.cache/bazel-ios
          key: ${{ steps.cache-keys.outputs.key }}
          restore-keys: |
            bazel-ios-${{ env.LITERT_LM_VERSION }}-${{ runner.os }}-

      - name: Build LiteRT-LM for iOS
        run: |
          chmod +x scripts/build-litert-lm-ios.sh
          scripts/build-litert-lm-ios.sh

      - name: Verify xcframework structure
        run: |
          echo "=== xcframework structure ==="
          find build/output/LiteRTLM.xcframework -maxdepth 3 -type f | head -30
          echo ""
          echo "=== Library architectures ==="
          for lib in build/output/*/liblitert_lm.a; do
            echo "--- $lib ---"
            lipo -info "$lib" 2>/dev/null || file "$lib"
          done

      - name: Test compile wrapper against artifact
        run: |
          HEADERS="build/output/ios_sim_arm64/headers"
          WRAPPER="Sources/LiteRTLM"
          CLANG_FLAGS=(
            -std=c++20
            -fobjc-arc
            -target arm64-apple-ios13.0-simulator
            -isysroot "$(xcrun --sdk iphonesimulator --show-sdk-path)"
            -I "${HEADERS}"
            -I "${HEADERS}/nlohmann_json"
            -I "${HEADERS}/nlohmann_json/include"
            -I "${WRAPPER}"
            -Wno-deprecated-declarations
          )

          echo "=== Compiling each wrapper .mm file ==="
          FAIL=0
          for mm_file in "${WRAPPER}"/*.mm; do
            echo "--- Compiling $(basename "$mm_file") ---"
            if xcrun --sdk iphonesimulator clang++ "${CLANG_FLAGS[@]}" -c "$mm_file" 2>&1; then
              echo "  OK"
            else
              echo "  FAILED"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "=== Compile test FAILED ==="
            exit 1
          fi
          echo "=== All wrapper files compile OK ==="

      - name: Test link wrapper into binary
        run: |
          HEADERS="build/output/ios_sim_arm64/headers"
          WRAPPER="Sources/LiteRTLM"
          LIB="build/output/ios_sim_arm64/liblitert_lm.a"
          DYLIB_DIR="build/output/ios_sim_arm64/dylibs"
          SDK="$(xcrun --sdk iphonesimulator --show-sdk-path)"

          CLANG_FLAGS=(
            -std=c++20
            -fobjc-arc
            -target arm64-apple-ios13.0-simulator
            -isysroot "${SDK}"
            -I "${HEADERS}"
            -I "${HEADERS}/nlohmann_json"
            -I "${HEADERS}/nlohmann_json/include"
            -I "${WRAPPER}"
            -Wno-deprecated-declarations
          )

          # Compile all .mm files to .o
          OBJ_FILES=()
          for mm_file in "${WRAPPER}"/*.mm; do
            obj="/tmp/$(basename "${mm_file}" .mm).o"
            echo "--- Compiling $(basename "$mm_file") ---"
            xcrun --sdk iphonesimulator clang++ "${CLANG_FLAGS[@]}" -c "$mm_file" -o "$obj"
            OBJ_FILES+=("$obj")
          done

          # Write a minimal main that references our wrapper symbols
          cat > /tmp/link_test.mm << 'LINKEOF'
          #import "LRTEngine.h"
          #import "LRTSession.h"
          #import "LRTConversation.h"
          int main() {
              // Force the linker to pull in our wrapper symbols
              [LRTEngineConfig configWithModelPath:@"test.litertlm"];
              [LRTSessionConfig defaultConfig];
              [LRTConversationConfig defaultConfig];
              [LRTDecodeConfig defaultConfig];
              [LRTConstraint jsonSchemaConstraint:@"{}"];
              [LRTInputText inputWithText:@"hi"];
              [LRTInputImage inputWithData:[NSData data]];
              return 0;
          }
          LINKEOF
          xcrun --sdk iphonesimulator clang++ "${CLANG_FLAGS[@]}" -c /tmp/link_test.mm -o /tmp/link_test.o

          # Link everything together with -force_load to surface all undefined symbols
          echo "=== Linking ==="
          LINK_FLAGS=(
            -target arm64-apple-ios13.0-simulator
            -isysroot "${SDK}"
            -force_load "${LIB}"
            -framework Foundation
            -framework Metal
            -framework AVFoundation
            -framework AudioToolbox
            -lc++
            -lobjc
          )
          # Add dylibs if present
          if [ -d "${DYLIB_DIR}" ]; then
            LINK_FLAGS+=(-L "${DYLIB_DIR}")
            for dylib in "${DYLIB_DIR}"/*.dylib; do
              LINK_FLAGS+=(-l"$(basename "$dylib" .dylib | sed 's/^lib//')")
            done
          fi

          xcrun --sdk iphonesimulator clang++ \
            "${LINK_FLAGS[@]}" \
            /tmp/link_test.o "${OBJ_FILES[@]}" \
            -o /tmp/link_test_bin 2>&1

          echo "=== Link test PASSED ==="

      - name: Upload xcframework artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteRTLM-xcframework-${{ env.LITERT_LM_VERSION }}
          path: build/output/LiteRTLM.xcframework
          retention-days: 30

      - name: Upload raw libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteRTLM-libs-${{ env.LITERT_LM_VERSION }}
          path: |
            build/output/ios_arm64/liblitert_lm.a
            build/output/ios_arm64/dylibs/
            build/output/ios_sim_arm64/liblitert_lm.a
            build/output/ios_sim_arm64/dylibs/
          retention-days: 30

      - name: Save Bazel cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.cache/bazel-ios
          key: ${{ steps.cache-keys.outputs.key }}

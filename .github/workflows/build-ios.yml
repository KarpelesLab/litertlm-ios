name: "Build LiteRT-LM for iOS"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      litert_lm_version:
        description: 'LiteRT-LM version tag'
        default: 'v0.10.1'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: "Build iOS xcframeworks"
    runs-on: macos-15
    timeout-minutes: 180
    env:
      LITERT_LM_VERSION: ${{ inputs.litert_lm_version || 'v0.10.1' }}
      WORK_DIR: ${{ github.workspace }}/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up cache keys
        id: cache-keys
        run: |
          echo "key=bazel-ios-${{ env.LITERT_LM_VERSION }}-${{ runner.os }}-${{ hashFiles('scripts/build-litert-lm-ios.sh') }}" >> "$GITHUB_OUTPUT"

      - name: Restore Bazel cache
        uses: actions/cache/restore@v4
        id: bazel-cache
        with:
          path: ~/.cache/bazel-ios
          key: ${{ steps.cache-keys.outputs.key }}
          restore-keys: |
            bazel-ios-${{ env.LITERT_LM_VERSION }}-${{ runner.os }}-

      - name: Build LiteRT-LM for iOS
        run: |
          chmod +x scripts/build-litert-lm-ios.sh
          scripts/build-litert-lm-ios.sh

      - name: Verify xcframeworks
        run: |
          echo "=== LiteRTLM.xcframework ==="
          find build/output/LiteRTLM.xcframework -maxdepth 3 | head -20
          echo ""
          echo "=== Public headers ==="
          find build/output/LiteRTLM.xcframework -name '*.h' | sort
          echo ""
          echo "=== GemmaConstraintProvider.xcframework ==="
          find build/output/GemmaConstraintProvider.xcframework -maxdepth 3 2>/dev/null | head -10 || echo "(not found)"

      - name: Test link against framework
        run: |
          # Test that we can compile and link against the xcframework
          SDK="$(xcrun --sdk iphonesimulator --show-sdk-path)"

          # Find the simulator slice in the xcframework
          LIB_DIR=$(find build/output/LiteRTLM.xcframework -name '*.a' -path '*simulator*' -exec dirname {} \; | head -1)
          HDR_DIR="${LIB_DIR}/Headers"
          LIB_FILE=$(find "${LIB_DIR}" -name '*.a' | head -1)

          echo "Library: ${LIB_FILE}"
          echo "Headers: ${HDR_DIR}"
          ls "${HDR_DIR}/"

          cat > /tmp/framework_test.m << 'TESTEOF'
          #import "LiteRTLM.h"
          int main() {
              @autoreleasepool {
                  LRTEngineConfig *config = [LRTEngineConfig configWithModelPath:@"test.litertlm"];
                  LRTSessionConfig *sc = [LRTSessionConfig defaultConfig];
                  sc.enableVision = YES;
                  LRTConversationConfig *cc = [LRTConversationConfig defaultConfig];
                  cc.enableConstrainedDecoding = YES;
                  LRTConstraint *c = [LRTConstraint jsonSchemaConstraint:@"{}"];
                  LRTDecodeConfig *dc = [LRTDecodeConfig defaultConfig];
                  LRTInputText *t = [LRTInputText inputWithText:@"hi"];
                  LRTInputImage *img = [LRTInputImage inputWithData:[NSData data]];
                  LRTChannel *ch = [LRTChannel channelWithName:@"t" startDelimiter:@"<t>" endDelimiter:@"</t>"];
                  (void)config; (void)sc; (void)cc; (void)c; (void)dc; (void)t; (void)img; (void)ch;
              }
              return 0;
          }
          TESTEOF

          # Compile
          xcrun --sdk iphonesimulator clang \
            -fobjc-arc \
            -target arm64-apple-ios13.0-simulator \
            -isysroot "${SDK}" \
            -I "${HDR_DIR}" \
            -c /tmp/framework_test.m -o /tmp/framework_test.o

          # Link with -force_load
          LINK_FLAGS=(
            -target arm64-apple-ios13.0-simulator
            -isysroot "${SDK}"
            -force_load "${LIB_FILE}"
            -framework Foundation -framework Metal
            -framework AVFoundation -framework AudioToolbox
            -lc++ -lobjc
          )
          # Add Gemma dylib if present
          GEMMA_DIR=$(find build/output/GemmaConstraintProvider.xcframework -name '*.dylib' -path '*simulator*' -exec dirname {} \; 2>/dev/null | head -1)
          if [ -n "${GEMMA_DIR}" ]; then
            DYLIB=$(find "${GEMMA_DIR}" -name '*.dylib' | head -1)
            LINK_FLAGS+=("${DYLIB}")
          fi

          xcrun --sdk iphonesimulator clang++ \
            "${LINK_FLAGS[@]}" \
            /tmp/framework_test.o \
            -o /tmp/framework_test_bin

          echo "=== Link test PASSED ==="

      - name: Upload LiteRTLM.xcframework
        uses: actions/upload-artifact@v4
        with:
          name: LiteRTLM-${{ env.LITERT_LM_VERSION }}
          path: build/output/LiteRTLM.xcframework
          retention-days: 90

      - name: Upload GemmaConstraintProvider.xcframework
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: GemmaConstraintProvider-${{ env.LITERT_LM_VERSION }}
          path: build/output/GemmaConstraintProvider.xcframework
          retention-days: 90

      - name: Save Bazel cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.cache/bazel-ios
          key: ${{ steps.cache-keys.outputs.key }}
